services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: cafeteria
      POSTGRES_PASSWORD: cafeteria
      POSTGRES_DB: cafeteria
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../database:/docker-entrypoint-initdb.d:ro
    networks: [backend]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cafeteria -d cafeteria"]
      interval: 10s
      timeout: 5s
      retries: 10

  pgbouncer:
    image: edoburu/pgbouncer:latest
    environment:
      DB_USER: cafeteria
      DB_PASSWORD: cafeteria
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: cafeteria
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 200
      DEFAULT_POOL_SIZE: 20
      RESERVE_POOL_SIZE: 5
      RESERVE_POOL_TIMEOUT: 2
      QUERY_WAIT_TIMEOUT: 30
      ADMIN_USERS: cafeteria
    ports:
      - "6432:5432"
    networks: [backend]
    restart: unless-stopped
    depends_on:
      postgres:

        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "ps -ef | grep -q '[p]gbouncer'"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    networks: [backend]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks: [backend]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics -q ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  identity-provider:
    build: ../services/identity-provider
    environment:
      POSTGRES_HOST: pgbouncer
      POSTGRES_PORT: 5432
      POSTGRES_DB: cafeteria
      POSTGRES_USER: cafeteria
      POSTGRES_PASSWORD: cafeteria
    ports:
      - "8001:8000"
    networks: [backend]
    restart: unless-stopped
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 10

  order-gateway:
    build: ../services/order-gateway
    environment:
      POSTGRES_HOST: pgbouncer
      POSTGRES_PORT: 5432
      POSTGRES_DB: cafeteria
      POSTGRES_USER: cafeteria
      POSTGRES_PASSWORD: cafeteria
    ports:
      - "8002:8000"
    networks: [backend]
    restart: unless-stopped
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      identity-provider:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 10

  stock-service:
    build: ../services/stock-service
    environment:
      POSTGRES_HOST: pgbouncer
      POSTGRES_PORT: 5432
      POSTGRES_DB: cafeteria
      POSTGRES_USER: cafeteria
      POSTGRES_PASSWORD: cafeteria
    ports:
      - "8003:8000"
    networks: [backend]
    restart: unless-stopped
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 10

  kitchen-queue:
    build: ../services/kitchen-queue
    environment:
      POSTGRES_HOST: pgbouncer
      POSTGRES_PORT: 5432
      POSTGRES_DB: cafeteria
      POSTGRES_USER: cafeteria
      POSTGRES_PASSWORD: cafeteria
    ports:
      - "8004:8000"
    networks: [backend]
    restart: unless-stopped
    depends_on:
      pgbouncer:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 10

  notification-hub:
    build: ../services/notification-hub
    environment:
      POSTGRES_HOST: pgbouncer
      POSTGRES_PORT: 5432
      POSTGRES_DB: cafeteria
      POSTGRES_USER: cafeteria
      POSTGRES_PASSWORD: cafeteria
    ports:
      - "8005:8000"
    networks: [backend]
    restart: unless-stopped
    depends_on:
      pgbouncer:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 10

  payment-service:
    build: ../services/payment-service
    environment:
      POSTGRES_HOST: pgbouncer
      POSTGRES_PORT: 5432
      POSTGRES_DB: cafeteria
      POSTGRES_USER: cafeteria
      POSTGRES_PASSWORD: cafeteria
    ports:
      - "8006:8000"
    networks: [backend]
    restart: unless-stopped
    depends_on:
      pgbouncer:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 10

networks:
  backend:
    driver: bridge

volumes:
  postgres_data:
  rabbitmq_data:
